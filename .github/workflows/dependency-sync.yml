name: Dependency Sync Guard

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/pyproject.toml'
      - 'src/README.md'
      - 'src/tools/update_readme_deps.py'
      - '.github/workflows/dependency-sync.yml'
  push:
    branches: [ main ]
    paths:
      - 'src/pyproject.toml'
      - 'src/README.md'
      - 'src/tools/update_readme_deps.py'
      - '.github/workflows/dependency-sync.yml'
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-check:
    name: Verify README dependency blocks are in sync with pyproject
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Prepare Python
        run: |
          python -m pip install --upgrade pip "packaging>=26.0"

      - name: Verify dependency sync
        run: |
          cd src
          python -m tools.update_readme_deps --check
