name: Dependency Sync Guard

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/pyproject.toml'
      - 'src/README.md'
      - 'src/tools/update_readme_deps.py'
      - '.github/workflows/dependency-sync.yml'
  push:
    branches: [ main ]
    paths:
      - 'src/pyproject.toml'
      - 'src/README.md'
      - 'src/tools/update_readme_deps.py'
      - '.github/workflows/dependency-sync.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-check:
    name: Verify README dependency blocks are in sync with pyproject
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Prepare Python
        run: |
          python -m pip install --upgrade pip

      - name: Verify dependency sync
        run: |
          cd src
          python -m tools.update_readme_deps --check
