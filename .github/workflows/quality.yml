name: Quality Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skylos-advisory:
    name: Skylos Danger Advisory
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Skylos
        run: python -m pip install --upgrade pip skylos

      - name: Run Skylos advisory danger scan
        env:
          CI: true
        run: bash src/tools/run_skylos_danger_advisory.sh

  static-quality:
    name: Static Quality Checks
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "src/.[dev]"
          npm install --ignore-scripts --prefix src

      - name: Generate MLX stubs for mypy
        run: |
          mkdir -p typings
          STUB_ROOT="$(mktemp -d)"
          GENERATED_STUB=""

          # Generate recursive stubs into an output directory.
          # nanobind output layout for dotted modules varies by version.
          if python -m nanobind.stubgen -m mlx.core -r -O "$STUB_ROOT"; then
            if [ -f "$STUB_ROOT/mlx/core.pyi" ]; then
              GENERATED_STUB="$STUB_ROOT/mlx/core.pyi"
            elif [ -f "$STUB_ROOT/core.pyi" ]; then
              GENERATED_STUB="$STUB_ROOT/core.pyi"
            fi

            if [ -n "$GENERATED_STUB" ] && [ -f "$GENERATED_STUB" ]; then
              # Keep stubs in repo-local typings/ so mypy/pyrefly consume one source of truth.
              mkdir -p typings/mlx/core
              cp "$GENERATED_STUB" typings/mlx/core.pyi
              cp "$GENERATED_STUB" typings/mlx/core/__init__.pyi
            else
              echo "⚠️ MLX stub file missing after stubgen; type checking may be less accurate"
            fi
          else
            echo "⚠️ MLX stubgen failed; type checking may be less accurate"
          fi

          rm -rf "$STUB_ROOT"

      - name: Run static quality checks
        env:
          CI: true
        # Validation tests must not rewrite tracked `src/output/` assets; route
        # generated artifacts to a temp directory or gitignored `test_*` paths.
        run: bash src/tools/run_quality_checks.sh

      - name: Upload static-quality artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: error
          name: static-quality-artifacts
          path: |
            src/output/**
            src/.pytest_cache/**
            src/.coverage*
            src/*.xml
          retention-days: 7

  runtime-smoke:
    name: Runtime Smoke
    runs-on: macos-15
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "src/.[dev]"

      - name: Run runtime smoke
        env:
          CI: true
        # Validation tests must not rewrite tracked `src/output/` assets; route
        # generated artifacts to a temp directory or gitignored `test_*` paths.
        run: bash src/tools/run_runtime_smoke.sh

      - name: Upload runtime-smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: error
          name: runtime-smoke-artifacts
          path: |
            src/output/**
          retention-days: 7
