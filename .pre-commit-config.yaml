default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: commit-hygiene
        name: Commit Hygiene (staged files)
        entry: bash src/tools/run_commit_hygiene.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: fast-push-checks
        name: Fast Push Checks (static + non-slow tests)
        entry: bash src/tools/check_quality_simple.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
